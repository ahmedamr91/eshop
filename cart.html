<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart | AmrStore</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="brand"><span>Amr</span>Store</a>
    <nav class="nav" id="navMenu">
      <a href="index.html">Home</a><a href="products.html">Products</a><a href="about.html">About</a><a href="contact.html">Contact</a>
    </nav>
    <div class="actions"><button id="themeToggle"><i class="fa-solid fa-moon"></i></button><a href="cart.html" class="cart-link"><i class="fa-solid fa-bag-shopping"></i><span id="cartCount">0</span></a><button class="menu-btn" id="menuBtn"><i class="fa-solid fa-bars"></i></button></div>
  </header>
  <section class="page-hero"><h1>Your Cart</h1><p>Review your selected products before checkout.</p></section>
  <section class="cart-page">
    <div id="cartItems" class="cart-items"></div>
    <aside class="cart-summary">
      <h2>Order Summary</h2>
      <div><span>Subtotal</span><strong>$<span id="subtotal">0</span></strong></div>
      <div><span>Estimated Tax</span><strong>$<span id="tax">0</span></strong></div>
      <div class="total"><span>Total</span><strong>$<span id="total">0</span></strong></div>
      <button id="checkoutBtn" class="btn primary full">Checkout</button>
      <a href="products.html" class="btn secondary full">Continue Shopping</a>
    </aside>
  </section>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
