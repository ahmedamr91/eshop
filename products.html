<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | AmrStore</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="brand"><span>Amr</span>Store</a>
    <nav class="nav" id="navMenu">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="actions">
      <button id="themeToggle"><i class="fa-solid fa-moon"></i></button>
      <a href="cart.html" class="cart-link"><i class="fa-solid fa-bag-shopping"></i><span id="cartCount">0</span></a>
      <button class="menu-btn" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
    </div>
  </header>

  <section class="page-hero">
    <h1>Product Catalog</h1>
    <p>Search, filter, sort, add to cart, and save favorites.</p>
  </section>

  <section class="shop-layout">
    <aside class="filters-panel">
      <h3>Filters</h3>
      <input id="searchInput" type="search" placeholder="Search products..." />
      <select id="sortSelect">
        <option value="default">Sort by default</option>
        <option value="low">Price: low to high</option>
        <option value="high">Price: high to low</option>
        <option value="rating">Top rated</option>
      </select>
      <div class="filter-buttons">
        <button class="filter active" data-category="all">All</button>
        <button class="filter" data-category="tech">Tech</button>
        <button class="filter" data-category="office">Office</button>
        <button class="filter" data-category="fashion">Fashion</button>
        <button class="filter" data-category="home">Home</button>
      </div>
    </aside>
    <main>
      <div id="productCount" class="product-count"></div>
      <div id="productGrid" class="product-grid"></div>
    </main>
  </section>

  <div id="productModal" class="modal">
    <div class="modal-content">
      <button id="closeModal" class="modal-close">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <footer class="footer">
    <div><a href="index.html" class="brand"><span>Amr</span>Store</a><p>Premium company storefront.</p></div>
    <div><h4>Support</h4><a href="contact.html">Contact</a><a href="cart.html">Cart</a></div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
